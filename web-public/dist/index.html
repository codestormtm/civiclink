<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivicLink - Citizen Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Hide the Google Translate banner and toolbar */
      .goog-te-banner-frame,
      .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      .goog-te-combo { display: none !important; }
    </style>
    <script type="module" crossorigin src="/assets/index-J7A1JCtL.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-AVohQQR5.css">
  </head>
  <body>
    <div id="google_translate_element" style="display:none"></div>
    <div id="root"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,ta,si',
          autoDisplay: false
        }, 'google_translate_element');
      }
      window.changeLanguage = function(lang) {
        var select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = lang;
          select.dispatchEvent(new Event('change', { bubbles: true }));
        } else {
          // Widget not ready yet — retry once it loads
          setTimeout(function() { window.changeLanguage(lang); }, 500);
        }
      };
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
