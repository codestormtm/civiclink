name: worker
description: CivicLink Worker Android WebView shell for LAN development.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  file_picker: ^10.3.7
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.5.0
  geolocator: ^14.0.2
  http: ^1.6.0
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.11.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
