<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivicLink Worker Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .goog-te-banner-frame,
      .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      .goog-te-combo { display: none !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element" style="display:none"></div>
    <div id="root"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: "en",
          includedLanguages: "en,ta,si",
          autoDisplay: false
        }, "google_translate_element");
      }

      window.changeLanguage = function(lang) {
        var select = document.querySelector(".goog-te-combo");
        if (select) {
          select.value = lang;
          select.dispatchEvent(new Event("change", { bubbles: true }));
        } else {
          setTimeout(function() { window.changeLanguage(lang); }, 500);
        }
      };
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
